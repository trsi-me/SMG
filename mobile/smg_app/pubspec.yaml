name: smg_app
description: "نظام التعرف على النباتات SMG - تطبيق Flutter للتعرف على النباتات مع دمج بيانات الحساسات"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # UI و Navigation
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.3
  go_router: ^12.1.3
  
  # HTTP و API
  dio: ^5.3.2
  http: ^1.1.0
  
  # الصور والكاميرا
  camera: ^0.10.5+5
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  
  # التخزين المحلي
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  
  # الشبكة والاتصال
  connectivity_plus: ^5.0.2
  
  # الأدوات المساعدة
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  url_launcher: ^6.2.1
  
  # الرسوم البيانية
  fl_chart: ^0.65.0
  
  # التصميم والأيقونات
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  
  # إدارة الحالة
  provider: ^6.1.1
  
  # التحقق من البيانات
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  json_serializable: ^6.7.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  # الأصول
  assets:
    - assets/images/
    - assets/icons/
    - assets/data/
  
  # الخطوط
  fonts:
    - family: IBMPlexSansArabic
      fonts:
        - asset: assets/fonts/IBMPlexSansArabic-Thin.ttf
          weight: 100
        - asset: assets/fonts/IBMPlexSansArabic-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/IBMPlexSansArabic-Light.ttf
          weight: 300
        - asset: assets/fonts/IBMPlexSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSansArabic-Bold.ttf
          weight: 700
