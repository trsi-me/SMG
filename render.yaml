# SMG: Python deps only on Render. Ship Flutter web from backend/static/web (run Build-ForRender.ps1 locally, then git add).
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: smg-plant-app
    runtime: python
    region: frankfurt
    plan: free
    rootDir: .
    buildCommand: pip install --no-cache-dir -r backend/requirements.txt
    startCommand: cd backend && python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}
    healthCheckPath: /api/v1/health
    envVars:
      # Render كان يختار Python 3.14 تلقائياً؛ Pillow 10.1 يفشل من المصدر — ثبّت 3.11
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SERVER_HOST
        value: 0.0.0.0
      - key: DEBUG
        value: "False"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
