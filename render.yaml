# SMG on Render: Flutter web مسبقاً في backend/static/web | PyTorch CPU فقط لتقليل RAM والحجم
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: smg-plant-app
    runtime: python
    region: frankfurt
    plan: free
    rootDir: .
    buildCommand: |
      set -e
      python --version
      pip install --no-cache-dir torch==2.9.1 torchvision==0.24.1 --index-url https://download.pytorch.org/whl/cpu
      pip install --no-cache-dir -r backend/requirements.txt
      if [ ! -f ml/models/efficientnet_b4_v1.pt ]; then python create_default_model.py; fi
    startCommand: cd backend && OMP_NUM_THREADS=1 MKL_NUM_THREADS=1 TORCH_NUM_THREADS=1 python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SERVER_HOST
        value: 0.0.0.0
      - key: DEBUG
        value: "False"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
